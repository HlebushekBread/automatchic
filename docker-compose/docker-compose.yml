#docker-compose --env-file ../.env up --build -d
name: automatchic

services:
  app:
    container_name: app-automatchic
    build:
      context: ..
      dockerfile: app-service/Dockerfile
    ports:
      - "1337:8080"
    environment:
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - DB_URL=jdbc:postgresql://postgres:5432/automatchic
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_LIFETIME=${JWT_LIFETIME}
      - BROKER_URL=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_TIMEOUT=60000
      - FRONTEND_URL=http://softloaf.net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    restart: always

  notification:
    container_name: notification-automatchic
    build:
      context: ..
      dockerfile: notification-service/Dockerfile
    environment:
      - BROKER_URL=kafka:9092
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on:
      kafka:
        condition: service_started
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: postgres-automatchic
    restart: always
    environment:
      POSTGRES_DB: automatchic
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d automatchic" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-automatchic
    restart: always
    volumes:
      - redis-data:/data

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-automatchic
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  kafka-exporter:
    image: danielqsj/kafka-exporter
    container_name: kafka-exporter-automatchic
    command: [ "--kafka.server=kafka:9092" ]
    restart: always
    depends_on:
      - kafka

  prometheus:
    image: prom/prometheus:v2.44.0
    container_name: prometheus-automatchic
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager-automatchic
    environment:
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    restart:
        always

  grafana:
    image: grafana/grafana
    container_name: grafana-automatchic
    ports:
      - "1338:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards/files
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
  grafana-data: