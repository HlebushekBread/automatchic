global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'app-service'
    metrics_path: "/actuator/metrics"
    static_configs:
      - targets: ['app:8080']

  - job_name: 'kafka'
    static_configs:
      - targets: [ 'kafka-exporter:9308' ]

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - "alert_rules.yml"