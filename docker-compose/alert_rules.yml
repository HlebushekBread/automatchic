groups:
  - name: cpu-alerts
    rules:
      - alert: HighSystemCPUUsage
        expr: system_cpu_usage > 0.90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High system CPU usage detected"
          description: "Overall CPU usage on the system is over 90% for the last 2 minutes."

  - name: user-creation-alerts
    rules:
      - alert: HighUserCreationRate
        expr: increase(users_registered_total[5m]) > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High user creation increase detected"
          description: "The total of user creation has exceeded 10 users in the last 5 minutes."

  - name: kafka-alerts
    rules:
      - alert: HighKafkaConsumerLag
        expr: sum(kafka_consumergroup_lag) by (consumergroup, topic) > 50
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High Kafka consumer lag"
          description: "Consumer group {{ $labels.consumergroup }} is lagging behind on topic {{ $labels.topic }} by more than 50 messages for 1 minute."